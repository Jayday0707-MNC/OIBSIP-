<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Smart To-Do App</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Header -->
    <header>

        <h1>📋 Smart To-Do App</h1>

        <button id="theme-toggle">🌙</button>

    </header>

    <!-- Add Task Form -->

    <section class="task-form">

        <input
            type="text"
            id="task-input"
            placeholder="Enter a task..."
        >

        <input
            type="date"
            id="task-date"
        >

        <select id="priority">

            <option value="High">🔴 High</option>
            <option value="Medium">🟡 Medium</option>
            <option value="Low">🟢 Low</option>

        </select>

        <select id="category">

            <option value="School">🎓 School</option>
            <option value="Work">💼 Work</option>
            <option value="Personal">🏠 Personal</option>
            <option value="Other">📌 Other</option>

        </select>

        <button id="add-task">

            <i class="fas fa-plus"></i>

            Add Task

        </button>

    </section>

    <!-- Dashboard -->

    <section class="dashboard">

        <div class="card">

            <h2 id="total-tasks">0</h2>

            <p>Total Tasks</p>

        </div>

        <div class="card">

            <h2 id="completed-tasks">0</h2>

            <p>Completed</p>

        </div>

        <div class="card">

            <h2 id="pending-tasks">0</h2>

            <p>Pending</p>

        </div>

    </section>

    <!-- Search -->

    <section class="search-box">

        <input
            type="text"
            id="search"
            placeholder="🔍 Search tasks..."
        >

    </section>

    <!-- Filters -->

    <section class="filters">

        <button class="filter active" data-filter="all">

            All

        </button>

        <button class="filter" data-filter="pending">

            Pending

        </button>

        <button class="filter" data-filter="completed">

            Completed

        </button>

    </section>

    <!-- Task List -->

    <section>

        <ul id="task-list"></ul>

    </section>

    <!-- Empty State -->

    <div id="empty-state">

        <i class="fas fa-clipboard-list"></i>

        <h3>No Tasks Yet</h3>

        <p>Add your first task to get started.</p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
