<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="calculator">

        <!-- Title -->
        <div class="title-bar">
            <h2>Calculator</h2>
            <button id="theme-toggle">🌙</button>
        </div>

        <!-- Display -->
        <input
            type="text"
            id="display"
            placeholder="0"
            readonly
        >

        <!-- Calculator Buttons -->
        <div class="buttons" id="calculator-buttons">

            <!-- Scientific Row -->
            <button class="scientific">√</button>
            <button class="scientific">x²</button>
            <button class="scientific">xʸ</button>
            <button class="scientific">±</button>

            <!-- Row 2 -->
            <button class="clear">C</button>
            <button class="delete">⌫</button>
            <button class="operator">%</button>
            <button class="operator">/</button>

            <!-- Row 3 -->
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">*</button>

            <!-- Row 4 -->
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>

            <!-- Row 5 -->
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>

            <!-- Row 6 -->
            <button class="zero">0</button>
            <button>.</button>
            <button class="equal">=</button>

        </div>

        <!-- History -->
        <div class="history">

            <div class="history-header">
                <h3>History</h3>
                <button id="clear-history">Clear</button>
            </div>

            <ul id="history-list"></ul>

        </div>

        <!-- Footer -->
        <p class="footer">
            Developed by <strong>Nkosinathi Msimango</strong>
        </p>

    </div>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
